<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
    	<meta name="description" content="Sample Code to implement transform and transition">
	    <meta name="author" content="CHUA, JALDON, MORANA, OCAMPO">
	    <meta name="revised" content="7 April 2026">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
     	 	* {box-sizing: border-box}
			div{
				transition: all 0.5s;
			}
			
			#roll{
				width: 400px;
				height: 400px;
				margin: 30px auto;
				object-fit: cover;
				object-position: center;
			}
			#roll img{
				width: 100%;
        		height: 100%;
        		opacity: 0.75;
				position: relative;
				top: 70px;
				z-index: 1;
			}
      		#roll img:hover{
				opacity: 1;
			}
			#roll div{
				width: 200px;
				height: 200px;
			}
			#roll div:first-of-type{
				background-color: red;
				position:relative;
				z-index: 2;
				bottom:350px;
			}
			#roll div:nth-of-type(2){
				background-color: yellow;
				position:relative;
				z-index: 2;
				left: 200px;
				bottom: 550px;
				}
			#roll div:nth-of-type(3){
				background-color: blue;
				position:relative;
				z-index: 2;
				bottom: 550px;
			}
			#roll div:last-of-type{
 				background-color: green;
				position:relative;
				z-index: 2;
				bottom: 750px;
				left: 200px;
			}
			#roll:hover div:first-of-type {
				transform: skewX(-45deg) translate(-100px,0px);
			}
			#roll:hover div:nth-of-type(2) {
				transform: skewX(45deg) translate(100px,0px);
			}
			#roll:hover div:nth-of-type(3) {
				transform: skewX(45deg) translate(-100px,0px);
			}
			#roll:hover div:last-of-type {
				transform: skewX(-45deg) translate(100px,0px);
			}
			p {
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div id="roll">
			<p><a href="../index.html"> 
        <img src="https://cdn.pixabay.com/photo/2014/09/16/20/52/gorilla-448731_1280.jpg"/>
      </a>
      </p>
			<div></div>
			<div></div>
			<div></div>
			<div></div>
		</div>
    <p>Click on the Image for Home<br/>
    Source: https://cdn.pixabay.com/photo/2014/09/16/20/52/gorilla-448731_1280.jpg
    </p>
    
	</body>
</html>
